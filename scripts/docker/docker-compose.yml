# TSMusicBot — Docker Compose
# 一键部署：docker-compose pull && docker-compose up -d
#
# 默认从 GitHub Container Registry 拉取预构建镜像（amd64 + arm64），
# 无需本地编译，无需 Node.js / 构建工具链。
# 镜像内置：Node.js, FFmpeg, Opus 编码器，原生模块均已交叉编译。
#
# 如需指定版本，把 :latest 换成具体 tag（例如 :1.4.0）。
# 如需本地构建（开发或 fork），见底部注释。

services:
  tsmusicbot:
    image: ghcr.io/zhangtianyao1/teamspeak-music-bot:latest
    container_name: tsmusicbot
    # Use host network so the bot can reach TS3 server on LAN
    # If your TS3 server is on the same machine, this is required
    network_mode: host
    # If you prefer port mapping instead of host network, comment out
    # network_mode and uncomment ports:
    # ports:
    #   - "3000:3000"     # WebUI
    #   - "9987:9987/udp" # TS3 voice (only if TS3 server is in another container)
    volumes:
      - tsmusicbot-data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production

volumes:
  tsmusicbot-data:
    driver: local

# ------------------------------------------------------------------
# 本地构建（仅开发 / fork 场景使用）：
# 把上面的 `image:` 行删掉，换成下面的 build 块即可。
#
#     build:
#       context: ../..
#       dockerfile: scripts/docker/Dockerfile
# ------------------------------------------------------------------
